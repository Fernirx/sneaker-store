spring:
  datasource:
    url: >-
      jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/sneaker_store_db
      ?createDatabaseIfNotExist=true
      &useSSL=false
      &serverTimezone=Asia/Ho_Chi_Minh
      &allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    show-sql: true
    properties:
      hibernate:
        use_sql_comments: true

  flyway:
    baseline-on-migrate: true
    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:dev-email@gmail.com}
    password: ${MAIL_PASSWORD:dev-app-password}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:changeme}
            client-secret: ${GOOGLE_CLIENT_SECRET:changeme}
          facebook:
            client-id: ${FACEBOOK_APP_ID:changeme}
            client-secret: ${FACEBOOK_APP_SECRET:changeme}

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  admin:
    email: ${ADMIN_EMAIL:admin@sneakerstore.com}
    password: ${ADMIN_PASSWORD:Admin@123}

  security:
    jwt:
      secret: ${JWT_SECRET:dev-jwt-secret-key-for-local-development-only}