spring:
  datasource:
    url: >-
      jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/sneaker_store_db
      ?createDatabaseIfNotExist=true
      &useSSL=false
      &serverTimezone=Asia/Ho_Chi_Minh
      &allowPublicKeyRetrieval=true
    username: manager_user
    password: password

  jpa:
    show-sql: true
    properties:
      hibernate:
        use_sql_comments: true

  flyway:
    baseline-on-migrate: true
    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dev-email@gmail.com}
    password: ${MAIL_PASSWORD:dev-app-password}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:changeme}
            client-secret: ${GOOGLE_CLIENT_SECRET:changeme}

server:
  port: 8080